<section class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg">
  <div class="flex justify-between items-baseline gap-4 mb-3">
    <h2 class="text-lg font-semibold text-slate-200">Incidents</h2>
    <p class="text-slate-500 text-sm">Failures, mismatches, and alerts.</p>
  </div>
  {% if incidents %}
    <ul class="space-y-0 max-h-[460px] overflow-auto">
    {% for item in incidents %}
      <li class="border-b border-slate-800 py-2">
        <span class="inline-block min-w-[165px] font-mono text-xs text-slate-500">{{ item.timestamp }}</span>
        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold uppercase tracking-wide border {% if (item.category or '')|lower in ['error', 'failed', 'rejection', 'critical'] %}bg-red-500/15 text-red-400 border-red-500/30{% elif (item.category or '')|lower in ['warn', 'warning', 'running', 'retrying'] %}bg-amber-500/15 text-amber-400 border-amber-500/30{% else %}bg-blue-500/15 text-blue-400 border-blue-500/30{% endif %}">{{ item.category }}</span>
        <span class="font-semibold text-slate-200 ml-2">{{ item.title }}</span>
        {% if item.detail %}<p class="ml-[165px] mt-0.5 text-slate-500 text-sm">{{ item.detail }}</p>{% endif %}
      </li>
    {% endfor %}
    </ul>
  {% else %}
    <p class="text-sm text-slate-500">No incidents.</p>
  {% endif %}
</section>
