<section class="bg-slate-900 border border-slate-800 rounded-md p-1.5">
  <div class="flex justify-between items-baseline gap-2 mb-1.5">
    <h3 class="text-xs font-semibold text-slate-200 uppercase tracking-wide">Incidents</h3>
  </div>
  {% if incidents %}
    <ul class="space-y-0 overflow-y-auto">
    {% for item in incidents %}
      <li class="border-b border-slate-800/50 py-1">
        <span class="inline-block min-w-[130px] font-mono text-[11px] text-slate-500">{{ item.timestamp }}</span>
        <span class="inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold uppercase tracking-wide border {% if (item.category or '')|lower in ['error', 'failed', 'rejection', 'critical'] %}bg-red-500/15 text-red-400 border-red-500/30{% elif (item.category or '')|lower in ['warn', 'warning', 'running', 'retrying'] %}bg-amber-500/15 text-amber-400 border-amber-500/30{% else %}bg-blue-500/15 text-blue-400 border-blue-500/30{% endif %}">{{ item.category }}</span>
        <span class="font-semibold text-slate-200 text-xs ml-1">{{ item.title }}</span>
        {% if item.detail %}<p class="ml-[130px] text-[11px] text-slate-500">{{ item.detail }}</p>{% endif %}
      </li>
    {% endfor %}
    </ul>
  {% else %}
    <p class="text-[11px] text-slate-500">No incidents.</p>
  {% endif %}
</section>
