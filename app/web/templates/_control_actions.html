<section class="bg-white border border-gray-200 rounded-md p-1.5">
  <div class="flex justify-between items-baseline gap-2 mb-1.5">
    <h3 class="text-xs font-semibold text-gray-800 uppercase tracking-wide">Control Log</h3>
  </div>
  {% if control_actions %}
    <table class="w-full text-[11px] text-left font-mono">
      <thead>
        <tr>
          <th class="text-gray-400 text-[10px] uppercase tracking-wide font-semibold px-1.5 py-1 border-b border-gray-200">Time</th>
          <th class="text-gray-400 text-[10px] uppercase tracking-wide font-semibold px-1.5 py-1 border-b border-gray-200">Action</th>
          <th class="text-gray-400 text-[10px] uppercase tracking-wide font-semibold px-1.5 py-1 border-b border-gray-200">Value</th>
          <th class="text-gray-400 text-[10px] uppercase tracking-wide font-semibold px-1.5 py-1 border-b border-gray-200">Reason</th>
          <th class="text-gray-400 text-[10px] uppercase tracking-wide font-semibold px-1.5 py-1 border-b border-gray-200">Actor</th>
        </tr>
      </thead>
      <tbody>
      {% for item in control_actions %}
        <tr>
          <td class="text-gray-400 px-1.5 py-1 border-b border-gray-200">{{ item.timestamp }}</td>
          <td class="text-gray-700 px-1.5 py-1 border-b border-gray-200">{{ item.action }}</td>
          <td class="text-gray-700 px-1.5 py-1 border-b border-gray-200">{{ item.value or "-" }}</td>
          <td class="text-gray-700 px-1.5 py-1 border-b border-gray-200 truncate max-w-[150px]">{{ item.reason or "-" }}</td>
          <td class="text-gray-700 px-1.5 py-1 border-b border-gray-200">{{ item.actor }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p class="text-[11px] text-gray-400">No control actions yet.</p>
  {% endif %}
</section>
