{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-[20%_1fr_20%] gap-2 h-full overflow-hidden">

  <!-- LEFT COL: System / Risk -->
  <div class="flex flex-col gap-2 overflow-y-auto">
    <div id="overview-engine-panel" hx-get="/fragments/overview-engine" hx-trigger="load, every 8s" hx-swap="innerHTML"></div>

    <!-- Risk Briefing -->
    <div id="risk-briefing-panel" class="flex-1 overflow-y-auto" hx-get="/fragments/risk-briefing" hx-trigger="load delay:300ms, every 15s" hx-swap="innerHTML">
      <svg class="htmx-indicator animate-spin h-3 w-3 text-gray-400 mx-auto mt-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" class="opacity-75"/></svg>
    </div>

    <!-- Quick Actions -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5">
      <h3 class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Actions</h3>
      <div class="grid grid-cols-2 gap-1">
        <form hx-post="/api/actions/start" hx-target="#action-result" hx-swap="innerHTML">
          <input type="hidden" name="mode" value="shadow" />
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2 py-1 rounded text-[10px] border border-blue-500 transition-colors">Shadow</button>
        </form>
        <form hx-post="/api/actions/start" hx-target="#action-result" hx-swap="innerHTML">
          <input type="hidden" name="mode" value="live" />
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2 py-1 rounded text-[10px] border border-blue-500 transition-colors">Live</button>
        </form>
        <form hx-post="/api/actions/stop" hx-target="#action-result" hx-swap="innerHTML" data-confirm="Stop the bot now?">
          <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-gray-900 font-semibold px-2 py-1 rounded text-[10px] border border-red-500 transition-colors">Stop</button>
        </form>
        <form hx-post="/api/actions/pause" hx-target="#action-result" hx-swap="innerHTML">
          <button type="submit" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-2 py-1 rounded text-[10px] border border-gray-300 transition-colors">Pause</button>
        </form>
        <form hx-post="/api/actions/scan-now" hx-target="#action-result" hx-swap="innerHTML">
          <input type="hidden" name="mode" value="shadow" />
          <button type="submit" class="w-full bg-transparent hover:bg-gray-100 text-gray-700 font-semibold px-2 py-1 rounded text-[10px] border border-gray-300 transition-colors">Scan</button>
        </form>
        <form hx-post="/api/actions/reconcile" hx-target="#action-result" hx-swap="innerHTML">
          <button type="submit" class="w-full bg-transparent hover:bg-gray-100 text-gray-700 font-semibold px-2 py-1 rounded text-[10px] border border-gray-300 transition-colors">Recon</button>
        </form>
      </div>
    </div>
  </div>

  <!-- CENTER COL: Chart + Tabbed Panels -->
  <div class="flex flex-col gap-2 overflow-hidden">
    <!-- Equity Chart -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-shrink-0" style="height: 45%;">
      <div class="flex justify-between items-baseline mb-1">
        <h3 class="text-xs font-semibold text-gray-800">Portfolio Equity</h3>
        <span class="text-[10px] text-gray-400 font-mono">90d · 30s refresh</span>
      </div>
      <div id="equity-chart" class="w-full h-[calc(100%-20px)]"></div>
    </div>

    <!-- Tabbed: Status / Events / Incidents / Jobs -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-1 overflow-hidden flex flex-col">
      <div class="flex gap-1 bg-gray-100 rounded-lg p-1 mb-1.5 flex-shrink-0" id="center-tabs">
        <button onclick="switchTab('center','tab-status')" class="px-3 py-1.5 text-[11px] font-semibold rounded-md bg-gray-900 text-white shadow-sm" data-tab="tab-status">Status</button>
        <button onclick="switchTab('center','tab-events')" class="px-3 py-1.5 text-[11px] text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-md" data-tab="tab-events">Events</button>
        <button onclick="switchTab('center','tab-incidents')" class="px-3 py-1.5 text-[11px] text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-md" data-tab="tab-incidents">Incidents</button>
        <button onclick="switchTab('center','tab-jobs')" class="px-3 py-1.5 text-[11px] text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-md" data-tab="tab-jobs">Jobs</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div data-tab-content="tab-status" class="active" id="status-panel" hx-get="/fragments/status" hx-trigger="load, every 8s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-events" id="events-panel" hx-get="/fragments/events" hx-trigger="load delay:200ms, every 8s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-incidents" id="incidents-panel" hx-get="/fragments/incidents" hx-trigger="load delay:200ms, every 8s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-jobs" id="jobs-panel" hx-get="/fragments/jobs" hx-trigger="load delay:500ms, every 8s" hx-swap="innerHTML"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT COL: Intelligence / Pipeline / Broker -->
  <div class="flex flex-col gap-2 overflow-y-auto">
    <!-- Intelligence Feed -->
    <div id="intelligence-feed-panel" hx-get="/fragments/intelligence-feed" hx-trigger="load delay:300ms, every 15s" hx-swap="innerHTML"></div>

    <!-- Pipeline Status -->
    <div id="pipeline-status-panel" hx-get="/fragments/pipeline-status" hx-trigger="load delay:400ms, every 10s" hx-swap="innerHTML"></div>

    <!-- Broker Panel -->
    <div id="broker-panel" hx-get="/fragments/broker-panel" hx-trigger="load delay:500ms, every 15s, refreshPanel" hx-swap="innerHTML">
      <svg class="htmx-indicator animate-spin h-3 w-3 text-gray-400 mx-auto mt-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" class="opacity-75"/></svg>
    </div>

    <!-- Portfolio Analytics -->
    <div id="portfolio-analytics-panel" hx-get="/fragments/portfolio-analytics" hx-trigger="load delay:600ms, every 30s" hx-swap="innerHTML"></div>

    <!-- Broker Health -->
    <div id="broker-health-panel" hx-get="/fragments/broker-health" hx-trigger="load delay:800ms, every 10s" hx-swap="innerHTML"></div>

    <!-- Intent Audit -->
    <div id="intent-audit-panel" hx-get="/fragments/intent-audit" hx-trigger="load delay:800ms, every 10s" hx-swap="innerHTML"></div>

    <!-- Ledger -->
    <div id="ledger-panel" hx-get="/fragments/ledger" hx-trigger="load delay:1s, every 15s" hx-swap="innerHTML"></div>

    <!-- Job Detail -->
    <div id="job-detail-panel" hx-get="/fragments/job-detail" hx-trigger="load delay:500ms" hx-swap="innerHTML"></div>
  </div>

</div>

<!-- Equity Chart -->
<script>
(function() {
  var container = document.getElementById('equity-chart');
  var chart = window.createTerminalChart(container);
  if (!chart) return;

  var areaSeries = chart.addAreaSeries({
    topColor: 'rgba(59, 130, 246, 0.4)',
    bottomColor: 'rgba(59, 130, 246, 0.0)',
    lineColor: '#3b82f6',
    lineWidth: 2,
  });

  function fetchEquity() {
    fetch('/api/charts/equity-curve?days=90')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.length > 0) {
          areaSeries.setData(data);
          chart.timeScale().fitContent();
        }
      })
      .catch(function() {});
  }

  fetchEquity();
  setInterval(fetchEquity, 30000);

  var ro = new ResizeObserver(function() {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
  ro.observe(container);
})();
</script>
{% endblock %}
