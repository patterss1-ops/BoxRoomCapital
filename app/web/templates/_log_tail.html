<section class="bg-white border border-gray-200 rounded-xl p-4 shadow-lg h-full min-h-0 flex flex-col">
  <div class="flex justify-between items-center gap-4 mb-3">
    <h2 class="text-lg font-semibold text-gray-800">Bot Log Tail</h2>
    <div class="flex items-center gap-2">
      <button onclick="copyPanelEvents(this,'log-tail-pre',10)" class="text-[10px] text-gray-400 hover:text-gray-700 border border-gray-200 rounded px-1.5 py-0.5 flex-shrink-0">Copy 10</button>
      <p class="text-gray-400 text-sm">Recent control-plane log lines.</p>
    </div>
  </div>
  {% if log_text %}
    <pre id="log-tail-pre" class="bg-gray-50 text-gray-500 font-mono text-xs rounded-lg p-3 overflow-auto flex-1 min-h-0 leading-tight whitespace-pre-wrap break-words -webkit-overflow-scrolling-touch">{{ log_text }}</pre>
  {% else %}
    <p class="text-sm text-gray-400">No bot log output yet.</p>
  {% endif %}
</section>
