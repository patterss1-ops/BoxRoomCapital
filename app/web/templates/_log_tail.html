<section class="bg-white border border-gray-200 rounded-xl p-4 shadow-lg">
  <div class="flex justify-between items-baseline gap-4 mb-3">
    <h2 class="text-lg font-semibold text-gray-800">Bot Log Tail</h2>
    <p class="text-gray-400 text-sm">Recent control-plane log lines.</p>
  </div>
  {% if log_text %}
    <pre class="bg-gray-50 text-gray-500 font-mono text-xs rounded-lg p-3 overflow-auto max-h-80 leading-tight whitespace-pre-wrap break-words">{{ log_text }}</pre>
  {% else %}
    <p class="text-sm text-gray-400">No bot log output yet.</p>
  {% endif %}
</section>
