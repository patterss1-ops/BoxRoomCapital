<section class="bg-slate-900 border border-slate-800 rounded-md p-1.5">
  <div class="flex justify-between items-baseline gap-2 mb-1.5">
    <h3 class="text-xs font-semibold text-slate-200 uppercase tracking-wide">Events</h3>
  </div>
  {% if events %}
    <ul class="space-y-0 overflow-y-auto">
    {% for event in events %}
      <li class="border-b border-slate-800/50 py-1">
        <span class="inline-block min-w-[130px] font-mono text-[11px] text-slate-500">{{ event.timestamp }}</span>
        <span class="font-semibold text-slate-200 text-xs">{{ event.icon }} {{ event.headline }}</span>
        {% if event.detail %}<p class="ml-[130px] text-[11px] text-slate-500">{{ event.detail }}</p>{% endif %}
      </li>
    {% endfor %}
    </ul>
  {% else %}
    <p class="text-[11px] text-slate-500">No events yet.</p>
  {% endif %}
</section>
