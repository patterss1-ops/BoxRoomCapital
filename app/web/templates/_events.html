<section class="bg-white border border-gray-200 rounded-md p-1.5 h-full min-h-0 flex flex-col">
  <div class="flex justify-between items-center gap-2 mb-1.5">
    <h3 class="text-xs font-semibold text-gray-800 uppercase tracking-wide">Events</h3>
    <button onclick="copyPanelEvents(this,'events-list',10)" class="text-[10px] text-gray-400 hover:text-gray-700 border border-gray-200 rounded px-1.5 py-0.5 flex-shrink-0">Copy 10</button>
  </div>
  {% if events %}
    <ul id="events-list" class="space-y-0 overflow-y-auto min-h-0 flex-1 pr-1 -webkit-overflow-scrolling-touch">
    {% for event in events %}
      <li class="border-b border-gray-200 py-1">
        <span class="inline-block min-w-[130px] font-mono text-[11px] text-gray-400">{{ event.timestamp }}</span>
        <span class="font-semibold text-gray-800 text-xs">{{ event.icon }} {{ event.headline }}</span>
        {% if event.detail %}<p class="ml-[130px] text-[11px] text-gray-400">{{ event.detail }}</p>{% endif %}
      </li>
    {% endfor %}
    </ul>
  {% else %}
    <p class="text-[11px] text-gray-400">No events yet.</p>
  {% endif %}
</section>
