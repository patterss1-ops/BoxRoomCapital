{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-[1fr_1fr] gap-2 h-full overflow-hidden">

  <!-- LEFT PANE: Pipeline (Controls + Chart + Market Browser) -->
  <div class="flex flex-col gap-2 overflow-hidden">

    <!-- Execution Controls + Manual Trade (inline row) -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-shrink-0">
      <div class="flex gap-2 items-end flex-wrap">
        <!-- Bot Controls -->
        <form hx-post="/api/actions/start" hx-target="#action-result" hx-swap="innerHTML" class="flex gap-1 items-end">
          <select name="mode" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500/50">
            <option value="shadow" {% if default_mode == "shadow" %}selected{% endif %}>Shadow</option>
            <option value="live" {% if default_mode == "live" %}selected{% endif %}>Live</option>
          </select>
          <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-blue-500 transition-colors">Start</button>
        </form>
        <form hx-post="/api/actions/stop" hx-target="#action-result" hx-swap="innerHTML" data-confirm="Stop the bot now?">
          <button type="submit" class="bg-red-600 hover:bg-red-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-red-500 transition-colors">Stop</button>
        </form>
        <form hx-post="/api/actions/pause" hx-target="#action-result" hx-swap="innerHTML">
          <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-2.5 py-1 rounded text-xs border border-gray-300 transition-colors">Pause</button>
        </form>
        <form hx-post="/api/actions/resume" hx-target="#action-result" hx-swap="innerHTML">
          <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-2.5 py-1 rounded text-xs border border-gray-300 transition-colors">Resume</button>
        </form>
        <form hx-post="/api/actions/scan-now" hx-target="#action-result" hx-swap="innerHTML">
          <input type="hidden" name="mode" value="shadow" />
          <button type="submit" class="bg-transparent hover:bg-gray-100 text-gray-700 font-semibold px-2.5 py-1 rounded text-xs border border-gray-300 transition-colors">Scan</button>
        </form>
        <form hx-post="/api/actions/reconcile" hx-target="#action-result" hx-swap="innerHTML">
          <button type="submit" class="bg-transparent hover:bg-gray-100 text-gray-700 font-semibold px-2.5 py-1 rounded text-xs border border-gray-300 transition-colors">Recon</button>
        </form>

        <div class="border-l border-gray-300 h-5 mx-1"></div>

        <!-- Manual Trade (inline) -->
        <form hx-post="/api/actions/manual-trade" hx-target="#action-result" hx-swap="innerHTML"
              data-confirm="Place this trade with real money?" class="flex gap-1 items-end">
          <select id="trade-epic" name="epic" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500/50 max-w-[140px]">
            {% for ticker, info in market_map.items() %}
            <option value="{{ info.epic }}">{{ ticker }}</option>
            {% endfor %}
          </select>
          <select id="trade-direction" name="direction" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500/50 w-16">
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
          </select>
          <input type="number" name="size" value="0.50" min="0.10" step="0.10"
            class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500/50 w-16" />
          <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-blue-500 transition-colors whitespace-nowrap">Trade</button>
        </form>
      </div>
    </div>

    <!-- Market Chart -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-shrink-0" style="height: 45%;">
      <div class="flex justify-between items-baseline mb-1">
        <div class="flex items-center gap-2">
          <h3 class="text-xs font-semibold text-gray-800">Market</h3>
          <span id="chart-market-label" class="text-[10px] text-gray-400 font-mono">SPY</span>
          <span id="chart-price-label" class="text-[11px] font-mono font-semibold text-gray-800"></span>
          <span id="chart-change-label" class="text-[10px] font-mono"></span>
        </div>
        <div class="flex gap-1" id="chart-interval-btns">
          <button onclick="changeInterval('5m','5d')" class="px-1.5 py-0.5 text-[9px] text-gray-400 hover:text-gray-800 rounded border border-transparent hover:border-gray-300" data-iv="5m">5m</button>
          <button onclick="changeInterval('15m','5d')" class="px-1.5 py-0.5 text-[9px] text-gray-400 hover:text-gray-800 rounded border border-transparent hover:border-gray-300" data-iv="15m">15m</button>
          <button onclick="changeInterval('1h','3mo')" class="px-1.5 py-0.5 text-[9px] text-gray-400 hover:text-gray-800 rounded border border-transparent hover:border-gray-300" data-iv="1h">1H</button>
          <button onclick="changeInterval('1d','6mo')" class="px-1.5 py-0.5 text-[9px] font-semibold text-gray-800 rounded border border-blue-400 bg-blue-50" data-iv="1d">1D</button>
          <button onclick="changeInterval('1wk','2y')" class="px-1.5 py-0.5 text-[9px] text-gray-400 hover:text-gray-800 rounded border border-transparent hover:border-gray-300" data-iv="1wk">1W</button>
        </div>
      </div>
      <div id="market-chart" class="w-full h-[calc(100%-24px)]"></div>
    </div>

    <!-- Tabbed: Market Browser / Broker / Risk Controls -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-1 overflow-hidden flex flex-col">
      <div class="flex gap-0 border-b border-gray-200 mb-1.5 flex-shrink-0" id="left-tabs">
        <button onclick="switchTab('left','tab-markets')" class="px-2.5 py-1 text-[11px] font-semibold border-b-2 border-blue-500 text-gray-900" data-tab="tab-markets">Markets</button>
        <button onclick="switchTab('left','tab-broker')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-broker">Broker</button>
        <button onclick="switchTab('left','tab-risk')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-risk">Risk Ctrl</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div data-tab-content="tab-markets" class="active" id="market-browser-panel" hx-get="/fragments/market-browser" hx-trigger="load delay:500ms, every 30s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-broker" id="broker-panel" hx-get="/fragments/broker-panel" hx-trigger="load delay:200ms, every 15s, refreshPanel" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-risk" class="space-y-1.5">
          <!-- Risk Controls inline -->
          <div class="grid grid-cols-2 gap-1.5 p-1">
            <form hx-post="/api/actions/kill-switch-enable" hx-target="#action-result" hx-swap="innerHTML" data-confirm="Enable kill switch?" class="flex flex-col gap-1">
              <input type="text" name="reason" value="Manual kill switch" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
              <button type="submit" class="bg-red-600 hover:bg-red-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-red-500 transition-colors">Kill ON</button>
            </form>
            <form hx-post="/api/actions/kill-switch-disable" hx-target="#action-result" hx-swap="innerHTML" data-confirm="Disable kill switch?" class="flex flex-col gap-1">
              <input type="text" name="reason" value="Manual clear" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
              <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-blue-500 transition-colors">Kill OFF</button>
            </form>
            <form hx-post="/api/actions/risk-throttle" hx-target="#action-result" hx-swap="innerHTML" class="flex gap-1 items-end col-span-2">
              <input type="number" name="throttle_pct" min="10" max="100" value="100" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs w-16 focus:ring-1 focus:ring-blue-500/50" />
              <input type="text" name="reason" value="Throttle" class="flex-1 bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
              <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-2.5 py-1 rounded text-xs border border-gray-300 transition-colors">Set</button>
            </form>
            <form hx-post="/api/actions/cooldown-set" hx-target="#action-result" hx-swap="innerHTML" class="flex gap-1 items-end">
              <input type="text" name="ticker" placeholder="SPY" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs w-14 placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
              <input type="number" name="minutes" min="1" value="30" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs w-14 focus:ring-1 focus:ring-blue-500/50" />
              <input type="hidden" name="reason" value="Manual cooldown" />
              <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-2.5 py-1 rounded text-xs border border-gray-300 transition-colors">Cool</button>
            </form>
            <form hx-post="/api/actions/cooldown-clear" hx-target="#action-result" hx-swap="innerHTML" class="flex gap-1 items-end">
              <input type="text" name="ticker" placeholder="SPY" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs w-14 placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
              <input type="hidden" name="reason" value="Manual clear" />
              <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-blue-500 transition-colors">Clear</button>
            </form>
          </div>
          <!-- Close Spread -->
          <form hx-post="/api/actions/close-spread" hx-target="#action-result" hx-swap="innerHTML" data-confirm="Close spread now?" class="flex gap-1 items-end p-1">
            <input type="text" name="spread_id" placeholder="spread_id" class="flex-1 bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
            <input type="text" name="ticker" placeholder="SPY" class="bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs w-14 placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50" />
            <input type="hidden" name="reason" value="Manual close" />
            <button type="submit" class="bg-red-600 hover:bg-red-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-red-500 transition-colors">Close</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANE: Positions / Orders / Monitoring -->
  <div class="flex flex-col gap-2 overflow-hidden">

    <!-- Tabbed: Positions / Orders / Reconcile -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-1 overflow-hidden flex flex-col">
      <div class="flex gap-0 border-b border-gray-200 mb-1.5 flex-shrink-0" id="right-tabs">
        <button onclick="switchTab('right','tab-positions')" class="px-2.5 py-1 text-[11px] font-semibold border-b-2 border-blue-500 text-gray-900" data-tab="tab-positions">Positions</button>
        <button onclick="switchTab('right','tab-orders')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-orders">Orders</button>
        <button onclick="switchTab('right','tab-status')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-status">Status</button>
        <button onclick="switchTab('right','tab-reconcile')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-reconcile">Recon</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div data-tab-content="tab-positions" class="active" id="open-positions-panel" hx-get="/fragments/open-positions" hx-trigger="load delay:500ms, every 10s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-orders" id="order-actions-panel" hx-get="/fragments/order-actions" hx-trigger="load delay:200ms, every 8s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-status" id="status-panel" hx-get="/fragments/status" hx-trigger="load, every 8s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-reconcile" id="reconcile-panel" hx-get="/fragments/reconcile-report" hx-trigger="load delay:500ms, every 15s" hx-swap="innerHTML"></div>
      </div>
    </div>

    <!-- Tabbed: Control Actions / Broker Health / Intent Audit / Ledger -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5 flex-1 overflow-hidden flex flex-col">
      <div class="flex gap-0 border-b border-gray-200 mb-1.5 flex-shrink-0" id="right2-tabs">
        <button onclick="switchTab('right2','tab-brief')" class="px-2.5 py-1 text-[11px] font-semibold border-b-2 border-blue-500 text-gray-900" data-tab="tab-brief">Brief</button>
        <button onclick="switchTab('right2','tab-ctrl')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-ctrl">Actions</button>
        <button onclick="switchTab('right2','tab-pipeline')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-pipeline">Pipeline</button>
        <button onclick="switchTab('right2','tab-health')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-health">Health</button>
        <button onclick="switchTab('right2','tab-audit')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-audit">Audit</button>
        <button onclick="switchTab('right2','tab-ledger')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-ledger">Ledger</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div data-tab-content="tab-brief" class="active" id="market-brief-panel" hx-get="/fragments/market-brief" hx-trigger="load delay:300ms" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-ctrl" id="control-actions-panel" hx-get="/fragments/control-actions" hx-trigger="load delay:500ms, every 10s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-pipeline" id="pipeline-status-panel" hx-get="/fragments/pipeline-status" hx-trigger="load delay:600ms, every 10s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-health" id="broker-health-panel" hx-get="/fragments/broker-health" hx-trigger="load delay:800ms, every 10s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-audit" id="intent-audit-panel" hx-get="/fragments/intent-audit" hx-trigger="load delay:800ms, every 10s" hx-swap="innerHTML"></div>
        <div data-tab-content="tab-ledger" id="ledger-panel" hx-get="/fragments/ledger" hx-trigger="load delay:1s, every 15s" hx-swap="innerHTML"></div>
      </div>
    </div>
  </div>
</div>

<!-- Market Chart + selectMarket (Candlestick + Volume) -->
<script>
(function() {
  var chartContainer = document.getElementById('market-chart');
  if (!chartContainer || typeof LightweightCharts === 'undefined') return;

  var chart = LightweightCharts.createChart(chartContainer, {
    layout: { background: { color: '#ffffff' }, textColor: '#374151', fontSize: 10 },
    grid: { vertLines: { color: '#f3f4f6' }, horzLines: { color: '#f3f4f6' } },
    rightPriceScale: { borderColor: '#e5e7eb', scaleMargins: { top: 0.05, bottom: 0.2 } },
    timeScale: { borderColor: '#e5e7eb', timeVisible: true, secondsVisible: false },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      horzLine: { color: '#9ca3af', labelBackgroundColor: '#374151' },
      vertLine: { color: '#9ca3af', labelBackgroundColor: '#374151' },
    },
  });

  var candleSeries = chart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    wickUpColor: '#26a69a', wickDownColor: '#ef5350',
  });

  var volumeSeries = chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: '',
  });
  volumeSeries.priceScale().applyOptions({
    scaleMargins: { top: 0.85, bottom: 0 },
  });

  // Map IG epics back to yfinance tickers
  var epicToTicker = {};
  {% for ticker, info in market_map.items() %}
  epicToTicker['{{ info.epic }}'] = '{{ ticker.replace("_trend", "") }}';
  {% endfor %}

  var currentTicker = 'SPY';
  var currentInterval = '1d';
  var currentPeriod = '6mo';
  var refreshTimer = null;

  function fetchOHLCV(ticker, interval, period) {
    fetch('/api/charts/ohlcv?ticker=' + encodeURIComponent(ticker) + '&interval=' + encodeURIComponent(interval) + '&period=' + encodeURIComponent(period))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.candles && data.candles.length > 0) {
          candleSeries.setData(data.candles);
          volumeSeries.setData(data.volumes || []);
          chart.timeScale().fitContent();
          // Update price label
          var last = data.candles[data.candles.length - 1];
          var prev = data.candles.length > 1 ? data.candles[data.candles.length - 2] : last;
          var priceLabel = document.getElementById('chart-price-label');
          var changeLabel = document.getElementById('chart-change-label');
          if (priceLabel) priceLabel.textContent = last.close.toFixed(2);
          if (changeLabel) {
            var chg = ((last.close - prev.close) / prev.close * 100).toFixed(2);
            var sign = chg >= 0 ? '+' : '';
            changeLabel.textContent = sign + chg + '%';
            changeLabel.style.color = chg >= 0 ? '#26a69a' : '#ef5350';
          }
        }
      })
      .catch(function(err) { console.warn('Chart fetch error:', err); });
  }

  function startRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    fetchOHLCV(currentTicker, currentInterval, currentPeriod);
    var ms = currentInterval === '1m' ? 15000 : currentInterval === '5m' ? 30000 : 60000;
    refreshTimer = setInterval(function() { fetchOHLCV(currentTicker, currentInterval, currentPeriod); }, ms);
  }

  startRefresh();

  var ro = new ResizeObserver(function() {
    chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
  });
  ro.observe(chartContainer);

  window.changeInterval = function(interval, period) {
    currentInterval = interval;
    currentPeriod = period;
    // Update button styles
    var btns = document.querySelectorAll('#chart-interval-btns button');
    btns.forEach(function(btn) {
      if (btn.getAttribute('data-iv') === interval) {
        btn.className = 'px-1.5 py-0.5 text-[9px] font-semibold text-gray-800 rounded border border-blue-400 bg-blue-50';
      } else {
        btn.className = 'px-1.5 py-0.5 text-[9px] text-gray-400 hover:text-gray-800 rounded border border-transparent hover:border-gray-300';
      }
    });
    startRefresh();
  };

  window.selectMarket = function(epic, igName, ticker) {
    // Map epic to yfinance ticker, falling back to the ticker param
    currentTicker = epicToTicker[epic] || ticker || 'SPY';
    // Strip _trend suffix for chart lookups
    currentTicker = currentTicker.replace('_trend', '');
    candleSeries.setData([]);
    volumeSeries.setData([]);
    var label = document.getElementById('chart-market-label');
    if (label) label.textContent = currentTicker + (igName ? ' — ' + igName : '');
    var epicSelect = document.getElementById('trade-epic');
    if (epicSelect) epicSelect.value = epic;
    startRefresh();
  };

  // Tooltip on crosshair move
  chart.subscribeCrosshairMove(function(param) {
    if (!param || !param.time) return;
    var candle = param.seriesData && param.seriesData.get(candleSeries);
    if (candle) {
      var priceLabel = document.getElementById('chart-price-label');
      if (priceLabel) priceLabel.textContent = 'O:' + candle.open.toFixed(2) + ' H:' + candle.high.toFixed(2) + ' L:' + candle.low.toFixed(2) + ' C:' + candle.close.toFixed(2);
    }
  });
})();
</script>
{% endblock %}
