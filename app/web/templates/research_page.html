{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-12 gap-4">

  <!-- Research Workflows — full width -->
  <div class="md:col-span-12">
    <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-lg">
      <div class="flex justify-between items-baseline gap-4 mb-3">
        <h2 class="text-lg font-semibold text-gray-800">Research Workflows</h2>
        <p class="text-gray-400 text-sm">Discovery, calibration, and strategy parameter promotion.</p>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
        <form hx-post="/api/actions/discover-options" hx-target="#action-result" hx-swap="innerHTML" class="bg-gray-100 border border-gray-300 rounded-lg p-3 flex flex-col gap-2">
          <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">Option Discovery</p>
          <div class="grid grid-cols-3 gap-2">
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Mode</label>
              <select name="mode" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="search" selected>Search</option>
                <option value="nav">Navigation</option>
                <option value="both">Both</option>
              </select>
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Details</label>
              <select name="include_details" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="on" selected>Yes</option>
                <option value="off">No</option>
              </select>
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Strikes</label>
              <input type="text" name="strikes" placeholder="US 500" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
          </div>
          <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-4 py-1.5 rounded-lg border border-gray-300 transition-colors text-sm">Run Discovery</button>
        </form>

        <form hx-post="/api/actions/calibrate-options" hx-target="#action-result" hx-swap="innerHTML" class="bg-gray-100 border border-gray-300 rounded-lg p-3 flex flex-col gap-2">
          <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">Calibration Run</p>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Index</label>
              <input type="text" name="index_filter" placeholder="US 500" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Verbose</label>
              <select name="verbose" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="off" selected>No</option>
                <option value="on">Yes</option>
              </select>
            </div>
          </div>
          <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-4 py-1.5 rounded-lg border border-gray-300 transition-colors text-sm">Run Calibration</button>
        </form>

        <form hx-post="/api/actions/research/engine-b-run" hx-target="#action-result" hx-swap="innerHTML" class="bg-gray-100 border border-gray-300 rounded-lg p-3 flex flex-col gap-2">
          <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">Manual Engine B Intake</p>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Source Class</label>
              <select name="source_class" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="news_wire" selected>news_wire</option>
                <option value="filing">filing</option>
                <option value="transcript">transcript</option>
                <option value="analyst_revision">analyst_revision</option>
                <option value="sa_quant">sa_quant</option>
                <option value="social_curated">social_curated</option>
                <option value="social_general">social_general</option>
              </select>
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Credibility</label>
              <input type="number" name="source_credibility" value="0.7" min="0" max="1" step="0.1" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
          </div>
          <div>
            <label class="text-gray-400 text-xs uppercase tracking-wide">Source IDs</label>
            <input type="text" name="source_ids" placeholder="filing:10q-2026-03-09, news:benzinga-123" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
          </div>
          <div>
            <label class="text-gray-400 text-xs uppercase tracking-wide">Raw Content</label>
            <textarea name="raw_content" rows="5" placeholder="Paste filing excerpt, news item, or transcript section" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500"></textarea>
          </div>
          <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-4 py-1.5 rounded-lg border border-gray-300 transition-colors text-sm">Run Engine B</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Strategy Parameter Lab — full width collapsible -->
  <div class="md:col-span-12">
    <details class="bg-white border border-gray-200 rounded-xl p-4 shadow-lg" open>
      <summary class="font-semibold text-gray-800 cursor-pointer">Strategy Parameter Lab</summary>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mt-3">
        <form hx-post="/api/actions/strategy-params/create" hx-target="#action-result" hx-swap="innerHTML" class="bg-gray-100 border border-gray-300 rounded-lg p-3 flex flex-col gap-2">
          <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">Create Parameter Set</p>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Strategy</label>
              <select name="strategy_key" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="ibs_credit_spreads" selected>ibs_credit_spreads</option>
              </select>
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Set Name</label>
              <input type="text" name="name" placeholder="ibs-shadow-candidate" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Status</label>
              <select name="status" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="shadow" selected>shadow</option>
                <option value="staged_live">staged_live</option>
              </select>
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Calibration Run ID</label>
              <input type="text" name="source_run_id" placeholder="optional run id" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
          </div>
          <div>
            <label class="text-gray-400 text-xs uppercase tracking-wide">Overrides JSON</label>
            <textarea name="overrides_json" rows="2" placeholder='{"min_credit_pct": 2.8}' class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm font-mono placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500"></textarea>
          </div>
          <div>
            <label class="text-gray-400 text-xs uppercase tracking-wide">Notes</label>
            <input type="text" name="notes" placeholder="why this set exists" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
          </div>
          <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-4 py-1.5 rounded-lg border border-blue-500 transition-colors text-sm">Save Param Set</button>
        </form>

        <form hx-post="/api/actions/strategy-params/promote" hx-target="#action-result" hx-swap="innerHTML" data-confirm="Promote selected parameter set?" class="bg-gray-100 border border-gray-300 rounded-lg p-3 flex flex-col gap-2">
          <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">Promote Parameter Set</p>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Set ID</label>
              <input type="text" name="set_id" placeholder="parameter set id" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Target Status</label>
              <select name="target_status" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500">
                <option value="staged_live" selected>staged_live</option>
                <option value="live">live</option>
                <option value="archived">archived</option>
              </select>
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Actor</label>
              <input type="text" name="actor" value="operator" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
            <div>
              <label class="text-gray-400 text-xs uppercase tracking-wide">Acknowledgement</label>
              <input type="text" name="acknowledgement" value="Manual promotion approved" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
            </div>
          </div>
          <div>
            <label class="text-gray-400 text-xs uppercase tracking-wide">Note</label>
            <input type="text" name="note" value="promoted from control plane" class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded-lg px-3 py-1.5 text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" />
          </div>
          <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-4 py-1.5 rounded-lg border border-gray-300 transition-colors text-sm">Promote Set</button>
        </form>
      </div>
    </details>
  </div>

  <!-- Research Fragment — full width -->
  <div class="md:col-span-12" id="research-panel" hx-get="/fragments/research" hx-trigger="load delay:300ms, every 15s" hx-swap="innerHTML"></div>

  <!-- Research Chain Viewer — full width -->
  <div class="md:col-span-12"
       id="research-artifact-chain-viewer"
       hx-get="/fragments/research/artifact-chain"
       hx-trigger="load delay:350ms"
       hx-swap="innerHTML"></div>

  <!-- Research Operator Output — full width -->
  <div class="md:col-span-12"
       id="research-operator-output"
       hx-get="/fragments/research/operator-output"
       hx-trigger="load delay:400ms"
       hx-swap="innerHTML"></div>

  <!-- Research Archive — full width -->
  <div class="md:col-span-12"
       id="research-archive"
       hx-get="/fragments/research/archive"
       hx-trigger="load delay:450ms, every 30s"
       hx-swap="innerHTML"></div>

  <!-- SA Snapshots — full width -->
  <div class="md:col-span-12" id="sa-symbol-captures-panel" hx-get="/fragments/sa-symbol-captures?limit=6" hx-trigger="load delay:450ms, every 20s" hx-swap="innerHTML"></div>

  <!-- Backtest Runs — full width -->
  <div class="md:col-span-12" id="backtest-panel" hx-get="/fragments/backtest" hx-trigger="load delay:500ms, every 15s" hx-swap="innerHTML"></div>

  <!-- Jobs + Job Detail — 2 column -->
  <div class="md:col-span-6" id="jobs-panel" hx-get="/fragments/jobs" hx-trigger="load delay:800ms, every 10s" hx-swap="innerHTML"></div>
  <div class="md:col-span-6" id="job-detail-panel" hx-get="/fragments/job-detail" hx-trigger="load delay:800ms" hx-swap="innerHTML"></div>

</div>
{% endblock %}
