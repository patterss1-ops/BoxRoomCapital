<!-- Intel "What to do next" action bar — loaded via HTMX, auto-refreshes -->
<div class="flex items-center gap-3 border rounded-xl px-4 py-2.5
  {% if state == 'running' %}bg-emerald-50/50 border-emerald-200
  {% elif state == 'review' %}bg-amber-50/50 border-amber-200
  {% elif state == 'advancing' %}bg-blue-50/50 border-blue-200
  {% elif state == 'complete' %}bg-blue-50/50 border-blue-200
  {% else %}bg-gray-50/50 border-gray-200{% endif %}">

  <!-- State dot -->
  <span class="w-2 h-2 rounded-full flex-shrink-0
    {% if state == 'running' %}bg-emerald-500 animate-pulse
    {% elif state == 'review' %}bg-amber-500
    {% elif state == 'advancing' %}bg-blue-500
    {% elif state == 'complete' %}bg-blue-500
    {% else %}bg-gray-300{% endif %}"></span>

  <!-- Message -->
  <p class="text-sm text-gray-800 flex-1">{{ message }}</p>

  <!-- Single action -->
  {% if action_type == 'scroll' %}
  <a href="{{ action_target }}"
     class="text-xs font-semibold px-3 py-1.5 rounded-lg border transition-colors whitespace-nowrap
       {% if state == 'review' %}bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100
       {% elif state == 'running' %}bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100
       {% else %}bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100{% endif %}">
    {{ action_label }}
  </a>
  {% elif action_type == 'focus' %}
  <button onclick="document.querySelector('{{ action_target }}')?.focus()"
          class="text-xs font-semibold px-3 py-1.5 rounded-lg border bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100 transition-colors whitespace-nowrap">
    {{ action_label }}
  </button>
  {% else %}
  <span class="text-xs text-gray-400 italic whitespace-nowrap">{{ action_label }}</span>
  {% endif %}
</div>
