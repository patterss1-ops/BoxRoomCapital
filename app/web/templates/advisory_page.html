{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-12 gap-2 h-full overflow-hidden">

  <!-- LEFT COL: Wrappers + Holdings + Transactions (5 cols) -->
  <div class="col-span-5 flex flex-col gap-2 overflow-y-auto">

    <!-- Wrapper Summary Cards -->
    <div id="advisory-holdings-panel"
         hx-get="/fragments/advisory-holdings"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
      <div class="text-[10px] text-gray-400 py-4 text-center">Loading holdings...</div>
    </div>

    <!-- Record Transaction Form -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5">
      <h3 class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Record Transaction</h3>
      <form hx-post="/api/advisory/transaction"
            hx-target="#tx-result"
            hx-swap="innerHTML"
            class="space-y-1">
        <div class="grid grid-cols-4 gap-1">
          <select name="tx_type" class="col-span-1 px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded">
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
            <option value="deposit">Deposit</option>
            <option value="withdrawal">Withdrawal</option>
            <option value="dividend">Dividend</option>
          </select>
          <select name="wrapper" class="col-span-1 px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded">
            <option value="ISA">ISA</option>
            <option value="SIPP">SIPP</option>
            <option value="GIA">GIA</option>
          </select>
          <input type="text" name="ticker" placeholder="VWRL.L"
                 class="col-span-1 px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded" />
          <button type="submit" class="col-span-1 px-2 py-1 text-[10px] font-semibold bg-blue-600 text-white rounded hover:bg-blue-700">
            Record
          </button>
        </div>
        <div class="grid grid-cols-4 gap-1">
          <input type="number" name="quantity" placeholder="Qty" step="0.01"
                 class="px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded" />
          <input type="number" name="price" placeholder="Price" step="0.01"
                 class="px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded" />
          <input type="number" name="amount" placeholder="Amount (GBP)" step="0.01"
                 class="px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded" />
          <input type="text" name="notes" placeholder="Notes"
                 class="px-1 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded" />
        </div>
      </form>
      <div id="tx-result" class="mt-1 text-[10px] font-mono"></div>
    </div>

    <!-- Transaction History -->
    <div id="advisory-transactions-panel"
         hx-get="/fragments/advisory-transactions"
         hx-trigger="load, every 15s"
         hx-swap="innerHTML">
      <div class="text-[10px] text-gray-400 py-2 text-center">Loading transactions...</div>
    </div>

    <!-- Advisor Memory -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5">
      <div class="flex items-center justify-between mb-1">
        <h3 class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide">Advisor Memory</h3>
        <span class="text-[9px] text-gray-300 font-mono">list / graph</span>
      </div>
      <div class="flex gap-0 border-b border-gray-200 mb-1" id="advisory-memory-tabs">
        <button onclick="switchTab('advisory-memory','tab-memory-list')" class="px-2.5 py-1 text-[11px] font-semibold border-b-2 border-blue-500 text-gray-900" data-tab="tab-memory-list">List</button>
        <button onclick="switchTab('advisory-memory','tab-memory-graph')" class="px-2.5 py-1 text-[11px] text-gray-400 hover:text-gray-700 border-b-2 border-transparent" data-tab="tab-memory-graph">Graph</button>
      </div>
      <div data-tab-content="tab-memory-list" class="active space-y-1">
        <form class="flex items-center gap-1"
              hx-get="/fragments/advisory-memories"
              hx-target="#advisory-memory-results"
              hx-swap="innerHTML">
          <input type="text" name="topic" id="memory-search-input"
                 placeholder="Search... (bonds, allocation, risk)"
                 class="flex-1 px-1.5 py-1 text-[10px] font-mono bg-gray-50 border border-gray-200 rounded focus:outline-none focus:border-blue-400 text-gray-700" />
          <button type="submit" class="px-2 py-1 text-[10px] font-semibold bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Go</button>
        </form>
        <div id="advisory-memory-results"
             hx-get="/fragments/advisory-memories?topic="
             hx-trigger="load"
             hx-swap="innerHTML"></div>
      </div>
      <div data-tab-content="tab-memory-graph" id="advisory-memory-graph-tab"
           hx-get="/fragments/advisory-memory-graph"
           hx-swap="innerHTML"></div>
    </div>
  </div>

  <!-- MIDDLE COL: Chat (4 cols) -->
  <div class="col-span-4 flex flex-col bg-white border border-gray-200 rounded-md overflow-hidden">
    <!-- Chat header -->
    <div class="flex items-center justify-between px-2 py-1 border-b border-gray-200 bg-gray-50">
      <div class="flex items-center gap-2">
        <h2 class="text-[11px] font-semibold text-gray-700 uppercase tracking-wide">Advisor Chat</h2>
        <button id="advisory-toggle"
                onclick="fetch('/api/advisory/toggle',{method:'POST'}).then(r=>r.json()).then(d=>{const btn=document.getElementById('advisory-toggle');if(d.advisor_enabled){btn.textContent='Online';btn.className='text-[9px] font-mono text-emerald-500 hover:text-emerald-600 cursor-pointer bg-transparent border-none p-0'}else{btn.textContent='Disabled';btn.className='text-[9px] font-mono text-red-400 hover:text-red-500 cursor-pointer bg-transparent border-none p-0'}})"
                class="text-[9px] font-mono {% if advisor_enabled %}text-emerald-500 hover:text-emerald-600{% else %}text-red-400 hover:text-red-500{% endif %} cursor-pointer bg-transparent border-none p-0"
                title="Click to toggle advisor on/off">
          {% if advisor_enabled %}Online{% else %}Disabled{% endif %}
        </button>
        <span id="advisory-spinner" class="htmx-indicator text-[10px] text-blue-500 font-mono">thinking...</span>
      </div>
      <span class="text-[9px] text-gray-400 font-mono" id="advisory-session-label">—</span>
    </div>

    <!-- Chat messages -->
    <div id="advisory-chat-messages" class="flex-1 overflow-y-auto p-2 space-y-2"
         hx-get="/fragments/advisory-chat"
         hx-trigger="load"
         hx-swap="innerHTML">
    </div>

    <!-- Chat input -->
    <div class="border-t border-gray-200 p-1.5 bg-gray-50">
      <form id="advisory-chat-form"
            onsubmit="return submitAdvisoryChat(event);">
        <div class="flex items-end gap-1">
          <textarea name="message" rows="2"
                    placeholder="Ask about allocation, tax wrappers, market views..."
                    class="flex-1 px-2 py-1 text-[11px] font-mono bg-white border border-gray-200 rounded resize-none focus:outline-none focus:border-blue-400 text-gray-800"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing){event.preventDefault();this.form.requestSubmit();}"></textarea>
          <button id="advisory-chat-submit" type="submit" class="px-3 py-1.5 text-[10px] font-semibold bg-blue-600 text-white rounded hover:bg-blue-700 whitespace-nowrap">Send</button>
        </div>
      </form>
    </div>

    <!-- Past sessions -->
    <div class="border-t border-gray-200 max-h-24 overflow-y-auto">
      <div id="advisory-sessions-panel"
           hx-get="/fragments/advisory-sessions"
           hx-trigger="load, every 15s"
           hx-swap="innerHTML">
      </div>
    </div>
  </div>

  <!-- RIGHT COL: News Feed + Analysis (3 cols) -->
  <div class="col-span-3 flex flex-col gap-2 overflow-y-auto">

    <!-- Quick Actions -->
    <div class="bg-white border border-gray-200 rounded-md p-1.5">
      <div class="flex gap-1">
        <button hx-post="/api/advisory/generate"
                hx-target="#advisory-chat-messages"
                hx-swap="innerHTML"
                hx-indicator="#advisory-spinner"
                class="flex-1 px-2 py-1 text-[10px] font-semibold bg-blue-600 text-white rounded hover:bg-blue-700">
          Weekly Review
        </button>
        <button hx-get="/fragments/advisory-news?refresh=1"
                hx-target="#advisory-news-panel"
                hx-swap="innerHTML"
                class="flex-1 px-2 py-1 text-[10px] font-semibold bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
          Refresh News
        </button>
      </div>
    </div>

    <!-- RSS News Feed -->
    <div id="advisory-news-panel"
         hx-get="/fragments/advisory-news"
         hx-trigger="load, every 120s"
         hx-swap="innerHTML">
      <div class="text-[10px] text-gray-400 py-4 text-center">Loading news...</div>
    </div>

    <!-- Feed Aggregator Intel -->
    <div id="advisory-intel-panel"
         hx-get="/fragments/advisory-intel"
         hx-trigger="load, every 60s"
         hx-swap="innerHTML">
      <div class="text-[10px] text-gray-400 py-4 text-center">Loading intel...</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="/static/advisory_memory_graph.js"></script>
<script>
function scrollChatToBottom() {
  const el = document.getElementById('advisory-chat-messages');
  if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 100);
}

function advisoryTimestamp() {
  const now = new Date();
  return now.toISOString().slice(0, 16).replace('T', ' ');
}

function escapeAdvisoryHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function appendAdvisoryPendingMessage(role, content, options) {
  const target = document.getElementById('advisory-chat-messages');
  if (!target) return null;
  const safeContent = escapeAdvisoryHtml(content);
  const safeLabel = escapeAdvisoryHtml(options && options.label ? options.label : 'Advisor');
  const safeTimestamp = escapeAdvisoryHtml(options && options.timestamp ? options.timestamp : advisoryTimestamp());
  const pending = document.createElement('div');
  pending.className = 'flex ' + (role === 'user' ? 'justify-end' : 'justify-start');
  if (options && options.pendingId) {
    pending.setAttribute('data-pending-id', options.pendingId);
  }
  pending.innerHTML = `
    <div class="max-w-[80%] rounded-md px-2 py-1.5 ${role === 'user' ? 'bg-blue-50 border border-blue-100' : 'bg-gray-50 border border-gray-200'}">
      ${role === 'user' ? '' : `
      <div class="flex items-center gap-1 mb-0.5">
        <span class="text-[9px] font-semibold text-blue-600 uppercase">${safeLabel}</span>
        <span class="text-[8px] text-gray-300 font-mono">${safeTimestamp}</span>
      </div>`}
      <div class="text-[11px] text-gray-800 font-mono whitespace-pre-wrap leading-relaxed">${safeContent}</div>
      ${role === 'user' ? `<div class="text-[8px] text-gray-300 font-mono text-right mt-0.5">${safeTimestamp}</div>` : ''}
    </div>`;
  const emptyState = target.querySelector('.flex.flex-col.items-center.justify-center');
  if (emptyState) {
    target.innerHTML = '';
  }
  target.appendChild(pending);
  scrollChatToBottom();
  return pending;
}

async function submitAdvisoryChat(event) {
  event.preventDefault();
  const form = event.currentTarget;
  const textarea = form.querySelector('textarea[name="message"]');
  const submitButton = document.getElementById('advisory-chat-submit');
  const spinner = document.getElementById('advisory-spinner');
  const message = textarea ? textarea.value.trim() : '';
  if (!message || form.dataset.submitting === 'true') {
    return false;
  }

  const timestamp = advisoryTimestamp();
  form.dataset.submitting = 'true';
  if (textarea) textarea.disabled = true;
  if (submitButton) submitButton.disabled = true;
  if (spinner) spinner.style.display = 'inline';

  appendAdvisoryPendingMessage('user', message, { timestamp: timestamp });
  const pendingAdvisor = appendAdvisoryPendingMessage(
    'assistant',
    'Thinking...',
    { timestamp: timestamp, pendingId: 'advisor-thinking', label: 'Advisor' }
  );

  if (textarea) {
    textarea.value = '';
    textarea.style.height = '';
  }

  try {
    const response = await fetch('/api/advisory/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
        'HX-Request': 'true'
      },
      body: new URLSearchParams({ message: message }).toString()
    });
    const html = await response.text();
    if (!response.ok) {
      throw new Error('Chat request failed with status ' + response.status);
    }
    const target = document.getElementById('advisory-chat-messages');
    if (target) {
      target.innerHTML = html;
    }
    const sessionsPanel = document.getElementById('advisory-sessions-panel');
    if (sessionsPanel && window.htmx) {
      htmx.ajax('GET', '/fragments/advisory-sessions', {
        target: '#advisory-sessions-panel',
        swap: 'innerHTML'
      });
    }
    scrollChatToBottom();
  } catch (error) {
    if (pendingAdvisor) {
      pendingAdvisor.remove();
    }
    appendAdvisoryPendingMessage(
      'assistant',
      'Sorry, there was a problem sending that. Please try again.',
      { timestamp: advisoryTimestamp(), label: 'System' }
    );
    console.error(error);
  } finally {
    delete form.dataset.submitting;
    if (textarea) {
      textarea.disabled = false;
      textarea.focus();
    }
    if (submitButton) submitButton.disabled = false;
    if (spinner) spinner.style.display = '';
  }
  return false;
}

document.addEventListener('htmx:afterSwap', function(evt) {
  if (evt.detail.target && evt.detail.target.id === 'advisory-chat-messages') {
    scrollChatToBottom();
  }
});
</script>
{% endblock %}
