{% set report = promotion_gate %}
{% include "_promotion_gate.html" %}

<section class="grid grid-cols-1 gap-4 mb-4">
  <div id="research-operating-summary"
       hx-get="/fragments/research/operating-summary"
       hx-trigger="load delay:50ms, every 15s"
       hx-swap="innerHTML"></div>
  <div id="research-readiness"
       hx-get="/fragments/research/readiness"
       hx-trigger="load delay:75ms, every 20s"
       hx-swap="innerHTML"></div>
</section>

<section class="grid grid-cols-1 gap-4 mb-4">
  <div id="research-alerts"
       hx-get="/fragments/research/alerts{% if selected_queue_lane != 'all' or selected_chain_id %}?{% if selected_queue_lane != 'all' %}queue_lane={{ selected_queue_lane }}{% endif %}{% if selected_chain_id %}{% if selected_queue_lane != 'all' %}&{% endif %}chain_id={{ selected_chain_id }}{% endif %}{% endif %}"
       hx-trigger="load delay:300ms, every 10s"
       hx-swap="innerHTML"></div>
</section>

<details open class="mb-4">
  <summary class="text-[11px] font-semibold text-gray-700 uppercase tracking-wide cursor-pointer mb-3">Active Research</summary>
  <div class="grid grid-cols-1 xl:grid-cols-12 gap-4">
    <div class="xl:col-span-8"
         id="research-active-hypotheses"
         hx-get="/fragments/research/active-hypotheses{% if selected_active_view != 'all' or selected_chain_id %}?{% if selected_active_view != 'all' %}active_view={{ selected_active_view }}{% endif %}{% if selected_chain_id %}{% if selected_active_view != 'all' %}&{% endif %}chain_id={{ selected_chain_id }}{% endif %}{% endif %}"
         hx-trigger="load delay:400ms, every 15s"
         hx-swap="innerHTML"></div>
    <div class="xl:col-span-4"
         id="research-recent-decisions"
         hx-get="/fragments/research/recent-decisions"
         hx-trigger="load delay:500ms, every 30s"
         hx-swap="innerHTML"></div>
    <div class="xl:col-span-4"
         id="research-engine-status"
         hx-get="/fragments/research/engine-status"
         hx-trigger="load delay:100ms, every 10s"
         hx-swap="innerHTML"></div>
    <div class="xl:col-span-4"
         id="research-pipeline-funnel"
         hx-get="/fragments/research/pipeline-funnel"
         hx-trigger="load delay:200ms, every 30s"
         hx-swap="innerHTML"></div>
  </div>
</details>

<details class="mb-4">
  <summary class="text-[11px] font-semibold text-gray-700 uppercase tracking-wide cursor-pointer mb-3">Portfolio Expression</summary>
  <section id="research-portfolio-expression">
    <div class="grid grid-cols-1 xl:grid-cols-12 gap-4">
      <div class="xl:col-span-8"
           id="research-portfolio-targets"
           hx-get="/fragments/research/portfolio-targets"
           hx-trigger="load delay:550ms, every 15s"
           hx-swap="innerHTML"></div>
      <div class="xl:col-span-4"
           id="research-rebalance-panel"
           hx-get="/fragments/research/rebalance-panel"
           hx-trigger="load delay:600ms, every 15s"
           hx-swap="innerHTML"></div>
      <div class="xl:col-span-4"
           id="research-regime-panel"
           hx-get="/fragments/research/regime-panel"
           hx-trigger="load delay:650ms, every 15s"
           hx-swap="innerHTML"></div>
      <div class="xl:col-span-8"
           id="research-signal-heatmap"
           hx-get="/fragments/research/signal-heatmap"
           hx-trigger="load delay:700ms, every 15s"
           hx-swap="innerHTML"></div>
      <div class="xl:col-span-12"
           id="research-regime-journal"
           hx-get="/fragments/research/regime-journal"
           hx-trigger="load delay:750ms, every 30s"
           hx-swap="innerHTML"></div>
    </div>
  </section>
</details>
