{% extends "base.html" %}

{% block content %}
<div class="space-y-2 p-2 h-full overflow-y-auto">

  <!-- Pipeline Board (kanban view of ideas by stage) -->
  <div id="idea-pipeline-board"
       hx-get="/fragments/idea-pipeline-board" hx-trigger="load delay:200ms, every 15s" hx-swap="innerHTML">
  </div>

  <!-- Backfill button (one-time: seed DB from existing analyses) -->
  <div id="backfill-banner" class="hidden">
    <button hx-post="/api/ideas/backfill" hx-swap="outerHTML"
            class="text-[10px] text-blue-400 hover:text-blue-300 underline">
      Backfill ideas from existing analyses
    </button>
  </div>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-2">

  <!-- Main council feed (polls every 8s so active jobs show progress) -->
  <div class="lg:col-span-8" id="intel-council-panel"
       hx-get="/fragments/intel-council" hx-trigger="load delay:300ms, every 8s" hx-swap="innerHTML">
  </div>

  <!-- Right sidebar: pipeline summary + stats -->
  <div class="lg:col-span-4 space-y-2">

    <!-- Pipeline Summary -->
    <div class="bg-white border border-gray-200 rounded-md p-2">
      <h3 class="text-xs font-semibold text-gray-800 uppercase tracking-wide mb-1.5">Idea Pipeline</h3>
      <div class="space-y-1" id="intel-pipeline-summary"
           hx-get="/fragments/intel-pipeline-summary" hx-trigger="load delay:500ms, every 30s" hx-swap="innerHTML">
      </div>
    </div>

    <!-- Council Costs -->
    <div id="intel-costs-panel"
         hx-get="/fragments/intel-costs" hx-trigger="load delay:700ms, every 30s" hx-swap="innerHTML">
    </div>

    <!-- Intelligence feed (existing) -->
    <div id="intelligence-feed-panel" hx-get="/fragments/intelligence-feed" hx-trigger="load delay:600ms, every 15s" hx-swap="innerHTML"></div>

    <!-- Seeking Alpha snapshots -->
    <div id="sa-symbol-captures-panel"
         hx-get="/fragments/sa-symbol-captures?limit=4"
         hx-trigger="load delay:650ms, every 20s"
         hx-swap="innerHTML"></div>

    <!-- Quick Submit -->
    <div class="bg-white border border-gray-200 rounded-md p-2">
      <h3 class="text-xs font-semibold text-gray-800 uppercase tracking-wide mb-1.5">Submit Intel</h3>
      <form hx-post="/api/intel/submit" hx-target="#submit-result" hx-swap="innerHTML" class="space-y-1.5">
        <textarea name="content" rows="3" placeholder="Paste text, X link, or analysis for the council..."
                  class="w-full bg-gray-100 border border-gray-300 text-gray-800 rounded px-2 py-1 text-xs placeholder-gray-400 focus:ring-1 focus:ring-blue-500/50 focus:border-blue-500"></textarea>
        <div class="flex gap-1.5">
          <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-gray-900 font-semibold px-2.5 py-1 rounded text-xs border border-blue-500 transition-colors">
            Analyze
          </button>
        </div>
        <div id="submit-result"></div>
      </form>
    </div>

  </div>
</div>
</div>
{% endblock %}
