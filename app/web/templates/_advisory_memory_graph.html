<div data-advisory-memory-graph
     data-graph-url="{{ graph_endpoint }}"
     class="space-y-1.5">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2 min-w-0">
      <span class="text-[9px] font-mono text-gray-400 truncate" data-graph-status>Loading memory graph...</span>
      <span class="text-[9px] font-mono text-gray-300 truncate" data-graph-meta></span>
    </div>
    <div class="flex items-center gap-1">
      <div class="flex items-center gap-0.5 border border-gray-200 rounded bg-white p-0.5">
        <button type="button"
                data-graph-view-mode="overview"
                class="px-2 py-1 text-[9px] font-semibold rounded bg-gray-900 text-white">
          Overview
        </button>
        <button type="button"
                data-graph-view-mode="expanded"
                class="px-2 py-1 text-[9px] font-semibold rounded text-gray-500 hover:text-gray-700">
          Expanded
        </button>
      </div>
      <button type="button"
              data-graph-reset
              class="px-2 py-1 text-[9px] font-semibold bg-white text-gray-600 border border-gray-200 rounded hover:bg-gray-50">
        Reset
      </button>
      <button type="button"
              data-graph-refresh
              class="px-2 py-1 text-[9px] font-semibold bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
        Refresh
      </button>
    </div>
  </div>

  <div class="text-[9px] font-mono text-gray-300">
    Drag to pin a node in place. Double-click a pinned node to release it.
  </div>

  <div class="border border-gray-200 rounded-md overflow-hidden bg-gray-50">
    <div data-graph-canvas class="w-full h-[360px]"></div>
  </div>

  <div data-graph-error class="hidden text-[10px] font-mono text-red-500"></div>

  <div data-graph-detail class="border border-gray-200 rounded-md bg-gray-50 px-2 py-1.5">
    <div class="text-[10px] font-mono text-gray-400">
      Select a node to inspect its topic, summary, confidence, tags, and related memories.
    </div>
  </div>
</div>
