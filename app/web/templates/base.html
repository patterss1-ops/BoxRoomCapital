<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "Trading Bot Control Plane" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body data-page="{{ page_key or 'overview' }}">
    <div class="app-shell">
      <header class="topbar">
        <div class="wrap shell-head">
          <div>
            <p class="eyebrow">Operator Console</p>
            <h1>Trading Bot Control Plane</h1>
            <p class="subtitle">FastAPI + HTMX runtime for local-first trading operations</p>
          </div>
          <button id="command-open" class="btn ghost" type="button">Command Palette</button>
        </div>
        <nav class="wrap nav-row">
          <a href="/overview" class="{% if page_key == 'overview' %}active{% endif %}">Overview</a>
          <a href="/trading" class="{% if page_key == 'trading' %}active{% endif %}">Trading</a>
          <a href="/research" class="{% if page_key == 'research' %}active{% endif %}">Research</a>
          <a href="/incidents" class="{% if page_key == 'incidents' %}active{% endif %}">Incidents & Jobs</a>
          <a href="/settings" class="{% if page_key == 'settings' %}active{% endif %}">Settings</a>
        </nav>
        <div
          id="top-strip"
          class="wrap"
          hx-get="/fragments/top-strip"
          hx-trigger="load, every 5s"
          hx-swap="innerHTML"
        ></div>
      </header>

      <div class="wrap">
        <div id="action-result" class="action-slot"></div>
      </div>

      <main class="wrap app-main">
      {% block content %}{% endblock %}
      </main>
    </div>

    <div id="command-palette" class="palette hidden" aria-hidden="true">
      <div class="palette-backdrop" data-close-palette="1"></div>
      <div class="palette-dialog" role="dialog" aria-modal="true" aria-label="Command palette">
        <div class="palette-head">
          <input id="palette-input" type="text" placeholder="Type a command (start, stop, research, incidents...)" />
        </div>
        <ul id="palette-list" class="palette-list"></ul>
        <p class="palette-help">Use up/down + enter. Press escape to close.</p>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
