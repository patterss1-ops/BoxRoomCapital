<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "Prop Terminal" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'Segoe UI', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
          },
        },
      }
    </script>
    <script>
      // Global helpers — available before page scripts run, no DOM access at define-time
      window.switchTab = function(group, tabId) {
        var container = document.getElementById(group + '-tabs');
        if (!container) return;
        container.querySelectorAll('button[data-tab]').forEach(function(btn) {
          btn.className = btn.getAttribute('data-tab') === tabId
            ? 'px-2.5 py-1 text-[11px] font-semibold border-b-2 border-blue-500 text-white'
            : 'px-2.5 py-1 text-[11px] text-slate-500 hover:text-slate-300 border-b-2 border-transparent';
        });
        container.parentElement.querySelectorAll('[data-tab-content]').forEach(function(panel) {
          panel.classList.toggle('active', panel.getAttribute('data-tab-content') === tabId);
        });
      };
      window.createTerminalChart = function(container, overrides) {
        if (!container || typeof LightweightCharts === 'undefined') return null;
        var opts = {
          layout: { background: { color: '#1A1D27' }, textColor: '#94a3b8', fontSize: 10 },
          grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
          rightPriceScale: { borderColor: '#334155' },
          timeScale: { borderColor: '#334155', timeVisible: false },
          crosshair: {
            horzLine: { color: '#475569', labelBackgroundColor: '#334155' },
            vertLine: { color: '#475569', labelBackgroundColor: '#334155' },
          },
        };
        if (overrides) {
          if (overrides.timeScale) Object.assign(opts.timeScale, overrides.timeScale);
        }
        return LightweightCharts.createChart(container, opts);
      };
    </script>
    <style>
      /* HTMX loading states */
      .htmx-request { opacity: 0.5; cursor: wait; transition: opacity 150ms ease; }
      .htmx-request button { pointer-events: none; }
      .htmx-indicator { display: none; }
      .htmx-request .htmx-indicator { display: inline; }
      /* Sidebar transition */
      .sidebar { transition: width 150ms ease; }
      .sidebar .nav-label { opacity: 0; transition: opacity 100ms ease; white-space: nowrap; overflow: hidden; }
      .sidebar:hover .nav-label { opacity: 1; }
      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
      /* Tab pane switching */
      [data-tab-content] { display: none; }
      [data-tab-content].active { display: block; }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-300 font-sans m-0 h-screen w-screen overflow-hidden flex flex-col" data-page="{{ page_key or 'overview' }}">

    <!-- TOP BAR — fixed 32px -->
    <header class="h-8 min-h-[32px] bg-slate-900 border-b border-slate-800 flex items-center px-2 gap-3 z-30 flex-shrink-0">
      <!-- Left: Title -->
      <div class="flex items-center gap-2 min-w-[140px]">
        <div class="w-5 h-5 rounded bg-blue-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        </div>
        <span class="text-white font-semibold text-xs tracking-wide">PROP TERMINAL</span>
      </div>

      <!-- Center: KPIs -->
      <div id="top-strip" class="flex-1 flex items-center justify-center gap-4 font-mono text-[11px]"
           hx-get="/fragments/top-strip" hx-trigger="load, every 5s" hx-swap="innerHTML">
      </div>

      <!-- Right: Kill Switch + Cmd Palette -->
      <div class="flex items-center gap-2 min-w-[140px] justify-end">
        <form hx-post="/api/actions/kill-switch-enable" hx-target="#action-result" hx-swap="innerHTML"
              data-confirm="Enable kill switch? New entries will be blocked.">
          <input type="hidden" name="reason" value="Top bar kill switch" />
          <button type="submit" class="bg-red-700 hover:bg-red-600 text-white font-bold px-3 py-0.5 rounded text-[10px] uppercase tracking-wider border border-red-500 transition-colors">
            Kill
          </button>
        </form>
        <button id="command-open" type="button" class="text-slate-500 hover:text-white transition-colors p-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
      </div>
    </header>

    <!-- Action result toast -->
    <div id="action-result" class="absolute top-9 right-2 z-40 max-w-sm"></div>

    <!-- BODY: Sidebar + Content -->
    <div class="flex flex-1 overflow-hidden">

      <!-- LEFT RAIL — collapsible -->
      <aside class="sidebar w-12 hover:w-44 bg-slate-900 border-r border-slate-800 flex flex-col flex-shrink-0 overflow-hidden z-20">
        <nav class="flex-1 py-1 space-y-0">
          <a href="/overview" class="flex items-center gap-2 px-3 py-2 text-xs {% if page_key == 'overview' %}text-white bg-slate-800/50 border-l-2 border-blue-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800/50 border-l-2 border-transparent{% endif %} transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zm0 7a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1h-4a1 1 0 01-1-1v-5zM4 13a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1v-2z"/></svg>
            <span class="nav-label">Overview</span>
          </a>
          <a href="/trading" class="flex items-center gap-2 px-3 py-2 text-xs {% if page_key == 'trading' %}text-white bg-slate-800/50 border-l-2 border-blue-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800/50 border-l-2 border-transparent{% endif %} transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="nav-label">Trading</span>
          </a>
          <a href="/research" class="flex items-center gap-2 px-3 py-2 text-xs {% if page_key == 'research' %}text-white bg-slate-800/50 border-l-2 border-blue-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800/50 border-l-2 border-transparent{% endif %} transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span class="nav-label">Research</span>
          </a>
          <a href="/intel" class="flex items-center gap-2 px-3 py-2 text-xs {% if page_key == 'intel' %}text-white bg-slate-800/50 border-l-2 border-blue-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800/50 border-l-2 border-transparent{% endif %} transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/></svg>
            <span class="nav-label">Intel</span>
          </a>
          <a href="/incidents" class="flex items-center gap-2 px-3 py-2 text-xs {% if page_key == 'incidents' %}text-white bg-slate-800/50 border-l-2 border-blue-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800/50 border-l-2 border-transparent{% endif %} transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <span class="nav-label">Incidents</span>
          </a>
          <a href="/settings" class="flex items-center gap-2 px-3 py-2 text-xs {% if page_key == 'settings' %}text-white bg-slate-800/50 border-l-2 border-blue-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800/50 border-l-2 border-transparent{% endif %} transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span class="nav-label">Settings</span>
          </a>
        </nav>
        <div class="px-2 py-1.5 border-t border-slate-800">
          <button id="command-open-sidebar" class="flex items-center gap-2 w-full px-1 py-1 text-slate-400 hover:text-white transition-colors rounded" type="button">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <span class="nav-label text-[10px]"><kbd class="px-1 py-0.5 bg-slate-800 rounded text-slate-500 border border-slate-700 text-[9px]">Ctrl+K</kbd></span>
          </button>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 overflow-hidden p-2">
        {% block content %}{% endblock %}
      </main>
    </div>

    <!-- Command Palette -->
    <div id="command-palette" class="hidden fixed inset-0 z-50" aria-hidden="true">
      <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" data-close-palette="1"></div>
      <div class="relative w-[min(600px,calc(100%-2rem))] mt-[15vh] mx-auto bg-slate-900 border border-slate-800 rounded-md shadow-2xl overflow-hidden" role="dialog" aria-modal="true" aria-label="Command palette">
        <div class="p-2 border-b border-slate-800">
          <input id="palette-input" type="text" class="w-full h-8 bg-slate-800 border border-slate-700 text-slate-200 rounded px-2 text-xs placeholder-slate-500 focus:ring-1 focus:ring-blue-500/50 focus:border-blue-500 outline-none" placeholder="Type a command..." />
        </div>
        <ul id="palette-list" class="p-1 max-h-64 overflow-auto"></ul>
        <p class="border-t border-slate-800 text-slate-500 px-2 py-1 text-[10px]">Arrow keys + Enter. Escape to close.</p>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
